name: Web and Node.js CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RENDERERS_INC: "--include 'renderers/**'"
  TOOLS_INC: "--include 'tools/**'"
  SAMPLES_INC: "--include 'samples/client/**'"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      renderers: ${{ steps.filter.outputs.renderers }}
      tools: ${{ steps.filter.outputs.tools }}
      samples: ${{ steps.filter.outputs.samples }}
      other: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            renderers:
              - 'renderers/**'
              - 'package.json'
              - 'yarn.lock'
              - '.github/workflows/web_ci.yml'
              - '.github/actions/setup-node/**'
            tools:
              - 'tools/**'
              - 'package.json'
              - 'yarn.lock'
              - '.github/workflows/web_ci.yml'
              - '.github/actions/setup-node/**'
            samples:
              - 'samples/client/**'
              - 'package.json'
              - 'yarn.lock'
              - '.github/workflows/web_ci.yml'
              - '.github/actions/setup-node/**'
            other:
              - 'samples/personalized_learning/**'
              - 'specification/**'
              - 'package.json'
              - 'yarn.lock'
              - '.github/workflows/web_ci.yml'
              - '.github/actions/setup-node/**'

  ci-renderers:
    needs: changes
    if: ${{ needs.changes.outputs.renderers == 'true' }}
    runs-on: ubuntu-latest
    # Healthy runs finish in ~20 min. Cap the job so a hung test fails fast
    # instead of running to the default 6h timeout (see issue #1637).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Install Playwright browsers
        run: npx playwright@1.58.1 install --with-deps chromium chromium-headless-shell
      - name: Setup Wireit Cache
        uses: google/wireit@9d7c2e5346f8ef1b1ab6014c4e96c74e234f7ed5 # setup-github-actions-caching/v2.0.4
      - name: Build Renderers
        run: eval "yarn workspaces foreach -A $RENDERERS_INC -p --topological-dev run build"
      - name: Test Renderers
        run: eval "yarn workspaces foreach -A $RENDERERS_INC -p run test"
      - name: Verify NPM Publish Script
        run: node --test renderers/scripts/publish_npm.test.mjs

  ci-tools:
    needs: changes
    if: ${{ needs.changes.outputs.tools == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Setup Wireit Cache
        uses: google/wireit@9d7c2e5346f8ef1b1ab6014c4e96c74e234f7ed5 # setup-github-actions-caching/v2.0.4
      - name: Build Tools
        run: eval "yarn workspaces foreach $TOOLS_INC -p --topological-dev -R run build"
      - name: Test Tools
        run: eval "yarn workspaces foreach -A $TOOLS_INC -p run test"

  ci-samples:
    needs: changes
    if: ${{ needs.changes.outputs.samples == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Setup Wireit Cache
        uses: google/wireit@9d7c2e5346f8ef1b1ab6014c4e96c74e234f7ed5 # setup-github-actions-caching/v2.0.4
      - name: Build Samples
        run: eval "yarn workspaces foreach $SAMPLES_INC -p --topological-dev -R run build"
      - name: Test Samples
        run: eval "yarn workspaces foreach -A $SAMPLES_INC -p run test"

  ci-other:
    needs: changes
    if: ${{ needs.changes.outputs.other == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node
      - name: Setup Wireit Cache
        uses: google/wireit@9d7c2e5346f8ef1b1ab6014c4e96c74e234f7ed5 # setup-github-actions-caching/v2.0.4
      - name: Build Other Workspaces
        run: |
          EXCLUDE=$(echo "$RENDERERS_INC $TOOLS_INC $SAMPLES_INC" | sed 's/--include/--exclude/g')
          eval "yarn workspaces foreach -A $EXCLUDE -p --topological-dev run build"
      - name: Test Other Workspaces
        run: |
          EXCLUDE=$(echo "$RENDERERS_INC $TOOLS_INC $SAMPLES_INC" | sed 's/--include/--exclude/g')
          eval "yarn workspaces foreach -A $EXCLUDE -p run test"
