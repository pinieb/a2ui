name: Swift Core (iOS)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "renderers/swift_core/**"
      - "Package.swift"
      - ".github/workflows/swift_core_build_and_test.yml"
  pull_request:
    branches: [main]
    paths:
      - "renderers/swift_core/**"
      - "Package.swift"
      - ".github/workflows/swift_core_build_and_test.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode Version
        # We target Xcode 15+ which supports Swift 5.9+ and iOS 17+ simulators
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Run Swift Core Tests
        # We reuse the local test runner script which auto-detects and boots an iOS Simulator
        run: ./renderers/swift_core/run_tests.sh
