name: Swift Core (iOS)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "swift/core/**"
      - "Package.swift"
      - ".github/workflows/swift_build_and_test.yml"
  pull_request:
    branches: [main]
    paths:
      - "swift/core/**"
      - "Package.swift"
      - ".github/workflows/swift_build_and_test.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test --enable-swift-testing
